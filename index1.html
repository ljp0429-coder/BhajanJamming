<!DOCTYPE html>
<html lang="en">
<head>

<title>Bhajan Jamming — June 7, 2026 — Event Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#0c0a14;--surface:#161224;--surface2:#1e1832;--border:#2a2444;--text:#e8e4f0;--text-dim:#8a82a0;--accent:#f59e0b;--accent-glow:#f59e0b44;--shakti:#e74c3c;--seva:#9b59b6;--shraddha:#3498db;--senior:#2ecc71;--paid:#2ecc71;--unpaid:#e74c3c;--conflict:#ff6b6b;--free:#8a82a0;--over:#e67e22;--under:#9b59b6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app-header{background:linear-gradient(135deg,#1a1230 0%,#2d1f4e 50%,#1a1230 100%);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.app-header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.app-header .subtitle{font-size:13px;color:var(--text-dim);font-weight:400}
.header-stats{display:flex;gap:24px;flex-wrap:wrap}
.header-stat{text-align:center}
.header-stat .val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.header-stat .lbl{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:14px 28px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text-dim);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;position:relative}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface2)}
.tab-badge{position:absolute;top:6px;right:6px;background:var(--conflict);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.panel{display:none;padding:24px}.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.revenue::before{background:var(--accent)}.kpi.tickets::before{background:var(--shraddha)}.kpi.paid::before{background:var(--paid)}.kpi.unpaid::before{background:var(--unpaid)}.kpi.donation::before{background:var(--seva)}.kpi.seats-kpi::before{background:#e67e22}.kpi.conflict-kpi::before{background:var(--conflict)}.kpi.over-kpi::before{background:var(--over)}
.kpi .kpi-label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.kpi .kpi-value{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace}
.bar-chart{margin-top:12px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-label{font-size:13px;min-width:140px;color:var(--text-dim)}
.bar-track{flex:1;height:24px;background:var(--surface2);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .8s ease;display:flex;align-items:center;padding-left:8px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;color:#fff}
/* Action list tables */
.action-table{width:100%;border-collapse:collapse;font-size:13px}
.action-table th{text-align:left;padding:8px 12px;background:var(--surface2);color:var(--text-dim);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.action-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.action-table tr:hover td{background:var(--surface2)}
.action-icon{font-size:16px;margin-right:4px}
.issue-card{background:var(--surface);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid}
.issue-card.conflict-type{border-color:var(--conflict);border-left:4px solid var(--conflict)}
.issue-card.unassigned-type{border-color:var(--under);border-left:4px solid var(--under)}
.issue-card.over-type{border-color:var(--over);border-left:4px solid var(--over)}
.issue-card h4{font-size:14px;margin-bottom:8px}
/* Seat map */
.seat-map-wrapper{overflow-x:auto;padding:20px 0}
.seat-map-theater{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:1050px}
.stage-label{background:linear-gradient(135deg,var(--accent),#fbbf24);color:#000;font-weight:700;font-size:16px;padding:10px 80px;border-radius:8px 8px 0 0;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.seat-row-wrap{display:flex;align-items:center;gap:0}
.section-odds{display:flex;flex-direction:row-reverse;gap:2px}
.section-evens{display:flex;flex-direction:row;gap:2px}
.aisle{width:36px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace}
.row-label-l,.row-label-r{width:28px;text-align:center;font-weight:700;font-size:13px;color:var(--accent);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.seat{width:28px;height:24px;border-radius:5px 5px 2px 2px;display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;border:2px solid transparent;position:relative;flex-shrink:0;overflow:hidden}
.seat.empty{background:var(--surface2);border-color:var(--border);color:var(--text-dim)}
.seat.occupied{color:#fff}
.seat.conflict{animation:pulse-conflict 1s infinite;box-shadow:0 0 8px var(--conflict);border-color:var(--conflict)!important}
.seat.member-over{box-shadow:0 0 5px var(--over);border-color:var(--over)!important;border-width:2px}
.seat.member-under{border-style:dashed!important;border-color:var(--under)!important;border-width:2px}
@keyframes pulse-conflict{0%,100%{border-color:var(--conflict);box-shadow:0 0 8px var(--conflict)}50%{border-color:#fff;box-shadow:0 0 14px #fff4}}
.seat:hover{transform:scale(1.7);z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.seat.dragging{opacity:.4}
.seat.drag-over{border-color:var(--accent)!important;box-shadow:0 0 12px var(--accent-glow);transform:scale(1.3)}
.seat.highlighted{transform:scale(1.3);z-index:5;box-shadow:0 0 14px var(--accent),0 0 28px var(--accent-glow);border-color:var(--accent)!important;border-width:2.5px}
.seat.dimmed{opacity:.2;filter:grayscale(.5)}
.seat.assignable{cursor:pointer;border-color:var(--accent)!important;border-style:dashed!important;background:rgba(245,158,11,.1)!important}
.seat.assignable:hover{background:rgba(245,158,11,.25)!important;transform:scale(1.4);box-shadow:0 0 12px var(--accent-glow)}
.seat-tooltip{display:none;position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:13px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.6);pointer-events:none;max-width:280px}
.seat-tooltip.show{display:block}
.seat-tooltip .tt-name{font-weight:700;font-size:14px;margin-bottom:4px}
.seat-tooltip .tt-detail{color:var(--text-dim)}
.seat-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:var(--surface);border-radius:8px;border:1px solid var(--border);align-items:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:13px}
.legend-swatch{width:18px;height:14px;border-radius:4px 4px 1px 1px}
.entrance-label{background:var(--surface2);color:var(--text-dim);font-size:12px;padding:6px 24px;border-radius:4px;margin:10px 0;letter-spacing:1px;text-transform:uppercase;border:1px dashed var(--border)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:var(--surface2);color:var(--text-dim);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);position:sticky;top:0;cursor:pointer}
th:hover{color:var(--accent)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-paid{background:#2ecc7122;color:var(--paid)}.badge-unpaid{background:#e74c3c22;color:var(--unpaid)}.badge-conflict{background:#ff6b6b22;color:var(--conflict)}.badge-free{background:#8a82a022;color:var(--free)}.badge-over{background:#e67e2222;color:var(--over)}.badge-under{background:#9b59b622;color:var(--under)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group select option{background:var(--surface)}
.btn{padding:10px 24px;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#fbbf24;transform:translateY(-1px)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-danger{background:var(--conflict);color:#fff}
.btn-danger:hover{background:#ff4444}
.search-bar{margin-bottom:16px}
.search-bar input{width:100%;max-width:400px;padding:10px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:90%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.5);max-height:90vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:16px;color:var(--accent)}
.modal .form-group{margin-bottom:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.chart-row{grid-template-columns:1fr}.seat{width:22px;height:20px;font-size:6px}.aisle{width:20px}}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);transition:all .2s}
.filter-chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.drag-hint{font-size:12px;color:var(--text-dim);font-style:italic;margin-bottom:8px}
.inline-edit{width:50px;padding:4px 6px;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none}
.inline-edit:focus{border-color:var(--accent)}
.seat-badge{display:flex;align-items:center;gap:4px;font-size:11px;font-family:'JetBrains Mono',monospace}
.seat-badge .ct{padding:1px 5px;border-radius:4px;font-weight:600}
.seat-badge .ct.ok{background:#2ecc7122;color:var(--paid)}
.seat-badge .ct.over{background:#e67e2222;color:var(--over)}
.seat-badge .ct.under{background:#9b59b622;color:var(--under)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--conflict);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;z-index:3000;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.show{display:block;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.remove-seat-btn{background:none;border:none;color:var(--conflict);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px}
.remove-seat-btn:hover{background:var(--conflict);color:#fff}
</style>
</head>

// ===== HELPERS =====
function parseSeats(s){if(!s||!s.trim())return[];return s.split(',').map(x=>x.trim()).filter(x=>x.length>0)}
function getSeatMap(){const m={};DATA.forEach(d=>{parseSeats(d.seats).forEach(s=>{if(!m[s])m[s]=[];m[s].push(d)})});return m}
function getTier(m){if(m.shakti>0)return'shakti';if(m.seva>0)return'seva';if(m.shraddha>0)return'shraddha';if(m.senior>0)return'senior';if(m.status==='Free')return'free';return'shraddha'}
function getConflicts(){const m=getSeatMap();const c={};Object.entries(m).forEach(([s,ms])=>{if(ms.length>1)c[s]=ms});return c}
function seatCount(m){return parseSeats(m.seats).length}
function getIssues(){
  const conflicts=getConflicts();
  const unassigned=DATA.filter(m=>m.tickets>0&&seatCount(m)<m.tickets);
  const over=DATA.filter(m=>seatCount(m)>m.tickets);
  return{conflicts,unassigned,over,total:Object.keys(conflicts).length+unassigned.length+over.length};
}
function showToast(msg,dur=3000){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ===== TABS =====
document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');document.getElementById('panel-'+t.dataset.tab).classList.add('active');
})});

function render(){renderHeader();renderDashboard();renderSeatMap();renderMembers();renderIssues();renderAddForm();updateBadges();autoSave()}

function updateBadges(){
  const iss=getIssues();
  const b=document.getElementById('issuesBadge');
  if(iss.total>0){b.style.display='flex';b.textContent=iss.total}else{b.style.display='none'}
}

// ===== HEADER =====
function renderHeader(){
  const tt=DATA.reduce((s,m)=>s+m.tickets,0),tr=DATA.reduce((s,m)=>s+m.amount,0),td=DATA.reduce((s,m)=>s+(m.donation||0),0),iss=getIssues();
  const assignedSeats=new Set();DATA.forEach(m=>parseSeats(m.seats).forEach(s=>assignedSeats.add(s)));
  let totalSeats=0;Object.values(ROWS_CONFIG).forEach(r=>{totalSeats+=r.odds.length+r.evens.length});
  document.getElementById('headerStats').innerHTML=`
    <div class="header-stat"><div class="val" style="color:var(--accent)">${tt}</div><div class="lbl">Tickets</div></div>
    <div class="header-stat"><div class="val" style="color:var(--paid)">$${tr.toLocaleString()}</div><div class="lbl">Revenue</div></div>
    <div class="header-stat"><div class="val" style="color:var(--seva)">$${td.toLocaleString()}</div><div class="lbl">Donations</div></div>
    <div class="header-stat"><div class="val">${assignedSeats.size}/${totalSeats}</div><div class="lbl">Seats Filled</div></div>
    <div class="header-stat"><div class="val" style="color:${iss.total>0?'var(--conflict)':'var(--paid)'}">${iss.total}</div><div class="lbl">Issues</div></div>`;
}

// ===== DASHBOARD =====
function renderDashboard(){
  const panel=document.getElementById('panel-dashboard');
  const tr=DATA.reduce((s,m)=>s+m.amount,0),td=DATA.reduce((s,m)=>s+(m.donation||0),0);
  const pr=DATA.filter(m=>m.status==='Succeeded').reduce((s,m)=>s+m.amount,0);
  const ur=DATA.filter(m=>m.status==='Not Paid').reduce((s,m)=>s+m.amount,0);
  const tt=DATA.reduce((s,m)=>s+m.tickets,0);
  const sk=DATA.reduce((s,m)=>s+m.shakti,0),sv=DATA.reduce((s,m)=>s+m.seva,0),sh=DATA.reduce((s,m)=>s+m.shraddha,0),sn=DATA.reduce((s,m)=>s+m.senior,0);
  const iss=getIssues();
  const methods={};
  DATA.forEach(m=>{const k=m.method;if(!methods[k])methods[k]={amount:0,count:0};methods[k].amount+=m.amount;methods[k].count+=m.tickets});
  const maxA=Math.max(...Object.values(methods).map(v=>v.amount),1);
  const mc={'Card':'#3498db','Apple/Google Pay':'#9b59b6','Cash (Rupal)':'#2ecc71','Cash (Leena)':'#e67e22','Not Paid':'#e74c3c'};
  let bars='';

function getTagColor(tag){
  if(!tag)return'#667';
  let h=0;for(let i=0;i<tag.length;i++)h=tag.charCodeAt(i)+((h<<5)-h);
  return TAG_COLORS[Math.abs(h)%TAG_COLORS.length];
}

      ${selSC>0?`<span style="color:var(--text-dim);margin-left:12px;font-size:12px">${parseSeats(selMem.seats).join(', ')}</span>`:''}

function setSeatColorMode(mode){seatColorMode=mode;renderSeatMap()}
function setSeatTagFilter(f){seatTagFilter=f;renderSeatMap()}

function selectMember(id){
  selectedMemberId=selectedMemberId===id?null:id;
  renderSeatMap();
}
function selectMemberFromDropdown(val){
  selectedMemberId=val===''?null:parseInt(val);
  renderSeatMap();
}
function clearSelection(){
  selectedMemberId=null;
  renderSeatMap();
}

function clickAssign(sid){
  if(selectedMemberId===null)return;
  const m=DATA[selectedMemberId];
  const sc=seatCount(m);
  if(sc>=m.tickets){
    showToast('❌ '+m.first+' already has '+sc+'/'+m.tickets+' seats assigned');
    return;
  }
  const seats=parseSeats(m.seats);
  seats.push(sid);
  m.seats=seats.join(', ');
  showToast('✓ '+sid+' assigned to '+m.first+' '+m.last+' ('+seats.length+'/'+m.tickets+')');
  render();
}

function buildSeat(rl,num,seatMap,conflicts,memberColors,highlightSeats,tagFilterSeats){
  const sid=`${rl}${num}`,occ=seatMap[sid]||[],isCon=conflicts[sid],empty=occ.length===0;
  const hasSelection=highlightSeats.size>0;
  const isHighlighted=highlightSeats.has(sid);
  const hasTagFilter=seatColorMode==='tag'&&seatTagFilter!=='All';
  const matchesTagFilter=tagFilterSeats.has(sid);

  let dimmed=false;
  if(hasSelection&&!isHighlighted) dimmed=true;
  if(hasTagFilter&&!empty&&!matchesTagFilter) dimmed=true;

  const dimClass=dimmed?'dimmed':'';
  const hlClass=isHighlighted?'highlighted':'';

  if(empty){
    const canClick=selectedMemberId!==null;
    const selMem=canClick?DATA[selectedMemberId]:null;
    const canAssignHere=selMem&&seatCount(selMem)<selMem.tickets;
    return`<div class="seat empty ${dimClass} ${canAssignHere?'assignable':''}" data-seat="${sid}" draggable="false" onclick="${canAssignHere?`clickAssign('${sid}')`:''}" onmouseenter="showTT(event,'${sid}')" onmouseleave="hideTT()" ondragover="dov(event)" ondragenter="den(event)" ondragleave="dlv(event)" ondrop="ddr(event,'${sid}')">${num}</div>`;
  }
  const m=occ[0];
  const sc=seatCount(m);
  const isOver=sc>m.tickets;
  const isUnder=sc<m.tickets;

  let bgColor;
  if(seatColorMode==='tag'){
    bgColor=m.tag?getTagColor(m.tag):'#667';
  } else {
    bgColor=memberColors[m.id]||(m.status==='Free'?'#555':'#667');
  }

  const classes=['seat','occupied',isCon?'conflict':'',isOver?'member-over':'',isUnder?'member-under':'',hlClass,dimClass].filter(Boolean).join(' ');
  return`<div class="${classes}" data-seat="${sid}" style="background:${bgColor}" draggable="true" onmouseenter="showTT(event,'${sid}')" onmouseleave="hideTT()" ondragstart="ds(event,'${sid}')" ondragover="dov(event)" ondragenter="den(event)" ondragleave="dlv(event)" ondrop="ddr(event,'${sid}')" ondragend="ded(event)">${num}</div>`;
}

function showTT(e,sid){
  const tt=document.getElementById('tooltip'),sm=getSeatMap(),occ=sm[sid]||[];
  if(!occ.length){
    const selM=selectedMemberId!==null?DATA[selectedMemberId]:null;
    const canA=selM&&seatCount(selM)<selM.tickets;
    tt.innerHTML=`<div class="tt-name">${sid}</div><div class="tt-detail">${canA?'👆 Click to assign to <strong>'+selM.first+' '+selM.last+'</strong>':'Empty seat'}</div>`}
  else{
    const lines=occ.map(m=>{
      const sc=seatCount(m),status=sc>m.tickets?'⚠ OVER-ASSIGNED':sc<m.tickets?'⚠ NEEDS SEATS':'✓';
      return`<div class="tt-name">${m.first} ${m.last}</div><div class="tt-detail">${getTier(m).toUpperCase()} · ${m.method} · Seats: ${sc}/${m.tickets} ${status}</div>`;
    }).join('<hr style="border-color:var(--border);margin:6px 0">');
    tt.innerHTML=lines+(occ.length>1?'<div style="color:var(--conflict);font-weight:700;margin-top:6px">⚠ DOUBLE BOOKED</div>':'');
  }
  tt.classList.add('show');tt.style.left=Math.min(e.clientX+14,window.innerWidth-300)+'px';tt.style.top=(e.clientY+14)+'px';
}
function hideTT(){document.getElementById('tooltip').classList.remove('show')}
function ds(e,sid){dragSource=sid;const sm=getSeatMap(),o=sm[sid];if(o&&o.length)dragMemberIdx=o[0].id;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function dov(e){e.preventDefault()}
function den(e){e.preventDefault();e.target.closest('.seat')?.classList.add('drag-over')}
function dlv(e){e.target.closest('.seat')?.classList.remove('drag-over')}
function ded(e){document.querySelectorAll('.seat').forEach(s=>{s.classList.remove('dragging','drag-over')})}
function ddr(e,target){
  e.preventDefault();document.querySelectorAll('.seat').forEach(s=>s.classList.remove('drag-over'));
  if(!dragSource||dragSource===target||dragMemberIdx===null)return;
  const m=DATA[dragMemberIdx],seats=parseSeats(m.seats),idx=seats.indexOf(dragSource);
  // Moving existing seat to new position (swap, not adding)
  if(idx>=0){seats[idx]=target;m.seats=seats.join(', ');render()}
  dragSource=null;dragMemberIdx=null;
}

let sortCol='first',sortDir=1,searchTerm='',filterMethod='All',filterTag='All';
let selectedIds=new Set();

function getFilteredMembers(){
  return DATA.filter(m=>{
    const name=`${m.first} ${m.last}`.toLowerCase();
    if(searchTerm&&!name.includes(searchTerm.toLowerCase()))return false;
    if(filterMethod!=='All'&&m.method!==filterMethod)return false;
    if(filterTag!=='All'){
      if(filterTag==='(untagged)'){if(m.tag)return false}
      else{if(m.tag!==filterTag)return false}
    }
    return true;
  });
}

function renderMembers(){
  const panel=document.getElementById('panel-members');
  const methods=['All',...new Set(DATA.map(m=>m.method))];
  const tags=['All','(untagged)',...getAllTags()];
  let filtered=getFilteredMembers();
  filtered.sort((a,b)=>{let va=a[sortCol],vb=b[sortCol];if(typeof va==='string')return va.localeCompare(vb)*sortDir;return((va||0)-(vb||0))*sortDir});

  const fTotalAmt=filtered.reduce((s,m)=>s+m.amount,0);
  const fTotalDon=filtered.reduce((s,m)=>s+(m.donation||0),0);
  const fTotalTix=filtered.reduce((s,m)=>s+m.tickets,0);
  const fTotalSeats=filtered.reduce((s,m)=>s+seatCount(m),0);
  const fPaid=filtered.filter(m=>m.status==='Succeeded').reduce((s,m)=>s+m.amount,0);
  const fUnpaid=filtered.filter(m=>m.status==='Not Paid').reduce((s,m)=>s+m.amount,0);
  const summaryLabel=filterMethod!=='All'?filterMethod:(filterTag!=='All'?filterTag:(searchTerm?`"${searchTerm}"`:'All Members'));
  const summaryCard=`<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;align-items:center">
    <div style="font-weight:700;font-size:14px;color:var(--accent);min-width:140px">${summaryLabel} <span style="color:var(--text-dim);font-weight:400;font-size:12px">(${filtered.length} members)</span></div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:13px;display:flex;gap:16px;flex-wrap:wrap">
      <span><span style="color:var(--text-dim)">Tickets:</span> <strong>${fTotalTix}</strong></span>
      <span><span style="color:var(--text-dim)">Seats:</span> <strong>${fTotalSeats}</strong></span>
      <span><span style="color:var(--text-dim)">Revenue:</span> <strong>$${fTotalAmt.toLocaleString()}</strong></span>
      <span><span style="color:var(--paid)">Collected:</span> <strong style="color:var(--paid)">$${fPaid.toLocaleString()}</strong></span>
      ${fUnpaid>0?`<span><span style="color:var(--unpaid)">Unpaid:</span> <strong style="color:var(--unpaid)">$${fUnpaid.toLocaleString()}</strong></span>`:''}
      ${fTotalDon>0?`<span><span style="color:var(--seva)">Donations:</span> <strong style="color:var(--seva)">$${fTotalDon.toLocaleString()}</strong></span>`:''}
    </div>
  </div>`;

  // Bulk action bar
  const selCount=selectedIds.size;
  const allChecked=filtered.length>0&&filtered.every(m=>selectedIds.has(m.id));
  const existingTags=getAllTags();
  const bulkBar=`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;padding:10px 16px;background:${selCount>0?'#f59e0b12':'var(--surface)'};border:1px solid ${selCount>0?'var(--accent)':'var(--border)'};border-radius:10px;min-height:44px">
    <span style="font-size:13px;font-weight:600;color:${selCount>0?'var(--accent)':'var(--text-dim)'}">${selCount>0?selCount+' selected':'Select members to bulk tag'}</span>
    ${selCount>0?`
      <span style="color:var(--text-dim);font-size:12px">→</span>
      ${existingTags.map(t=>`<div class="filter-chip" onclick="bulkTag('${t.replace(/'/g,"\\'")}')" style="border-color:${getTagColor(t)};font-size:11px;padding:4px 10px;cursor:pointer">${t}</div>`).join('')}
      <input type="text" id="bulkTagInput" placeholder="New tag..." style="padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:12px;width:120px;outline:none" onkeydown="if(event.key==='Enter'){bulkTag(this.value);this.value=''}">
      <button class="btn btn-sm btn-primary" style="font-size:11px;padding:4px 12px" onclick="bulkTagFromInput()">Apply</button>
      <button class="btn btn-sm" style="background:var(--surface2);color:var(--text-dim);font-size:11px;padding:4px 10px;border:1px solid var(--border)" onclick="bulkClearTag()">Clear Tags</button>
      <button class="btn btn-sm" style="background:none;color:var(--text-dim);font-size:11px;padding:4px 10px" onclick="selectedIds.clear();renderMembers()">Deselect</button>
    `:`
      <button class="btn btn-sm" style="background:var(--surface2);color:var(--text-dim);font-size:11px;padding:4px 10px;border:1px solid var(--border)" onclick="selectAllFiltered()">Select All (${filtered.length})</button>
    `}
  </div>`;

  panel.innerHTML=`
    <div class="search-bar"><input type="text" placeholder="Search by name..." value="${searchTerm}" oninput="searchTerm=this.value;renderMembers()"></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
      <span style="font-size:11px;color:var(--text-dim);font-weight:600">PAYMENT:</span>
      ${methods.map(m=>`<div class="filter-chip ${filterMethod===m?'active':''}" onclick="filterMethod='${m.replace(/'/g,"\\'")}';renderMembers()">${m}</div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <span style="font-size:11px;color:var(--text-dim);font-weight:600">TAG:</span>
      ${tags.map(t=>`<div class="filter-chip ${filterTag===t?'active':''}" onclick="filterTag='${t.replace(/'/g,"\\'")}';renderMembers()" ${t!=='All'&&t!=='(untagged)'?`style="border-color:${getTagColor(t)};${filterTag===t?'background:'+getTagColor(t)+';color:#fff;':''}"`:``}>${t}</div>`).join('')}
    </div>
    ${summaryCard}
    ${bulkBar}
    <div class="table-wrap" style="max-height:65vh;overflow-y:auto"><table>
      <tr><th style="width:36px"><input type="checkbox" ${allChecked?'checked':''} onchange="toggleSelectAll(this.checked)" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer"></th><th onclick="toggleSort('first')">Name</th><th onclick="toggleSort('tag')">Tag</th><th onclick="toggleSort('method')">Payment</th><th onclick="toggleSort('status')">Status</th><th onclick="toggleSort('tickets')">Tickets</th><th>Seats</th><th onclick="toggleSort('amount')">Amount</th><th></th></tr>
      ${filtered.map(m=>{
        const sb=m.status==='Succeeded'?'badge-paid':m.status==='Not Paid'?'badge-unpaid':'badge-free';
        const sc=seatCount(m),diff=sc-m.tickets;
        const seatStatus=diff>0?'over':diff<0?'under':'ok';
        const isChecked=selectedIds.has(m.id);
        return`<tr style="${isChecked?'background:rgba(245,158,11,.06)':''}">
        <td><input type="checkbox" ${isChecked?'checked':''} onchange="toggleSelect(${m.id},this.checked)" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer"></td>
        <td style="font-weight:600">${m.first} ${m.last}</td>
        <td>${m.tag?`<span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;background:${getTagColor(m.tag)}22;color:${getTagColor(m.tag)};border:1px solid ${getTagColor(m.tag)}44;cursor:pointer" onclick="promptTag(${m.id})">${m.tag}</span>`:`<button style="background:none;border:1px dashed var(--border);border-radius:12px;padding:2px 10px;font-size:11px;color:var(--text-dim);cursor:pointer;font-family:'Outfit',sans-serif" onclick="promptTag(${m.id})">+ tag</button>`}</td>
        <td style="font-size:12px">${m.method}</td><td><span class="badge ${sb}">${m.status}</span></td>
        <td><div class="seat-badge"><span class="ct ${seatStatus}">${sc}/${m.tickets}</span>${diff>0?'<span class="badge badge-over">+'+diff+'</span>':diff<0?'<span class="badge badge-under">'+diff+'</span>':''}</div></td>
        <td style="font-size:11px;font-family:'JetBrains Mono',monospace;max-width:180px;word-break:break-all">${m.seats||'<em style="color:var(--text-dim)">—</em>'}</td>
        <td style="font-family:'JetBrains Mono',monospace">$${m.amount}${m.donation>0?'<br><span style="color:var(--seva);font-size:11px">💰$'+m.donation+'</span>':''}</td>
        <td><button class="btn btn-sm" style="background:var(--accent);color:#000;font-size:11px;padding:3px 10px" onclick="openEditModal(${m.id})">✏️</button> <button class="btn btn-sm" style="background:var(--seva);color:#fff;font-size:11px;padding:3px 10px" onclick="openDM(${m.id})">💰</button></td></tr>`}).join('')}
    </table></div>`;
}

function toggleSelect(id,checked){if(checked)selectedIds.add(id);else selectedIds.delete(id);renderMembers()}
function toggleSelectAll(checked){
  const filtered=getFilteredMembers();
  if(checked)filtered.forEach(m=>selectedIds.add(m.id));
  else filtered.forEach(m=>selectedIds.delete(m.id));
  renderMembers();
}
function selectAllFiltered(){getFilteredMembers().forEach(m=>selectedIds.add(m.id));renderMembers()}
function bulkTag(tag){
  const t=tag.trim();if(!t)return;
  selectedIds.forEach(id=>{DATA[id].tag=t});
  const count=selectedIds.size;
  selectedIds.clear();render();
  showToast('✓ Tagged '+count+' members as "'+t+'"');
}
function bulkTagFromInput(){const inp=document.getElementById('bulkTagInput');if(inp&&inp.value.trim())bulkTag(inp.value.trim())}
function bulkClearTag(){
  const count=selectedIds.size;
  selectedIds.forEach(id=>{DATA[id].tag=''});
  selectedIds.clear();render();
  showToast('✓ Cleared tags from '+count+' members');
}
function toggleSort(c){if(sortCol===c)sortDir*=-1;else{sortCol=c;sortDir=1}renderMembers()}
function promptTag(id){
  const m=DATA[id];
  const existing=getAllTags();
  const tagPrompt=prompt('Tag for '+m.first+' '+m.last+':\n\nExisting tags: '+(existing.length?existing.join(', '):'none yet')+'\n\nType a tag name (or leave empty to clear):',m.tag||'');
  if(tagPrompt===null)return;
  m.tag=tagPrompt.trim();
  render();
  showToast(m.tag?'✓ Tagged "'+m.tag+'"':'✓ Tag cleared');
}

      <tr><th>Seat</th><th>Occupants</th></tr>
      ${Object.entries(iss.conflicts).map(([s,ms])=>`<tr><td style="font-weight:700;font-family:'JetBrains Mono',monospace">${s}</td><td>${ms.map(m=>'<strong>'+m.first+' '+m.last+'</strong> ('+m.method+')').join(' vs ')}</td></tr>`).join('')}
    </table></div>`;

  if(iss.unassigned.length){
    html+=`<div class="issue-card unassigned-type"><h4 style="color:var(--under)">🪑 Members Missing Seat Assignments</h4><table class="action-table">
      <tr><th>Name</th><th>Tickets</th><th>Assigned</th><th>Need</th><th></th></tr>
      ${iss.unassigned.map(m=>`<tr><td style="font-weight:600">${m.first} ${m.last}</td><td>${m.tickets}</td><td>${seatCount(m)}</td><td style="color:var(--under);font-weight:700">${m.tickets-seatCount(m)}</td><td><button class="btn btn-sm btn-primary" style="font-size:11px;padding:3px 10px" onclick="openEditModal(${m.id})">Assign</button></td></tr>`).join('')}
    </table></div>`;
  }
  if(iss.over.length){
    html+=`<div class="issue-card over-type"><h4 style="color:var(--over)">📋 Over-Assigned Members</h4><p style="color:var(--text-dim);margin-bottom:12px;font-size:13px">These members have more seats than tickets. Edit to correct ticket count or remove extra seats.</p><table class="action-table">
      <tr><th>Name</th><th>Tickets</th><th>Seats</th><th>Extra</th><th></th></tr>
      ${iss.over.map(m=>`<tr><td style="font-weight:600">${m.first} ${m.last}</td><td>${m.tickets}</td><td>${seatCount(m)}</td><td style="color:var(--over);font-weight:700">+${seatCount(m)-m.tickets}</td><td><button class="btn btn-sm btn-primary" style="font-size:11px;padding:3px 10px" onclick="openEditModal(${m.id})">Fix</button></td></tr>`).join('')}
    </table></div>`;
  }
  panel.innerHTML=html;
}

let editTarget=null;
function openEditModal(id){
  editTarget=id;const m=DATA[id];
  document.getElementById('editModalTitle').textContent=`Edit: ${m.first} ${m.last}`;
  document.getElementById('editFirst').value=m.first;
  document.getElementById('editLast').value=m.last;
  document.getElementById('editShakti').value=m.shakti;
  document.getElementById('editSeva').value=m.seva;
  document.getElementById('editShraddha').value=m.shraddha;
  document.getElementById('editSenior').value=m.senior;
  document.getElementById('editMethod').value=m.method;
  document.getElementById('editStatus').value=m.status;
  document.getElementById('editAmount').value=m.amount;
  document.getElementById('editDonation').value=m.donation||0;
  document.getElementById('editSeats').value=m.seats;
  document.getElementById('editNotes').value=m.notes;
  document.getElementById('editTag').value=m.tag||'';
  document.getElementById('editSeatWarning').style.display='none';
  document.getElementById('editModal').classList.add('show');
}
function closeEditModal(){document.getElementById('editModal').classList.remove('show');editTarget=null}
function saveEdit(){
  if(editTarget===null)return;
  const m=DATA[editTarget];
  const sk=parseInt(document.getElementById('editShakti').value)||0;
  const sv=parseInt(document.getElementById('editSeva').value)||0;
  const sh=parseInt(document.getElementById('editShraddha').value)||0;
  const sn=parseInt(document.getElementById('editSenior').value)||0;
  const totalTickets=sk+sv+sh+sn;
  const newSeats=document.getElementById('editSeats').value.trim();
  const seatList=parseSeats(newSeats);

  // ENFORCE: cannot assign more seats than tickets
  if(seatList.length>totalTickets){
    document.getElementById('editSeatWarning').style.display='block';
    document.getElementById('editSeatWarning').textContent=`❌ Cannot assign ${seatList.length} seats for ${totalTickets} tickets. Remove ${seatList.length-totalTickets} seat(s) or increase ticket count.`;
    return;
  }

  m.first=document.getElementById('editFirst').value.trim();
  m.last=document.getElementById('editLast').value.trim();
  m.shakti=sk;m.seva=sv;m.shraddha=sh;m.senior=sn;
  m.tickets=totalTickets;
  m.method=document.getElementById('editMethod').value;
  m.status=document.getElementById('editStatus').value;
  m.amount=parseInt(document.getElementById('editAmount').value)||0;
  m.donation=parseInt(document.getElementById('editDonation').value)||0;
  m.seats=newSeats;
  m.notes=document.getElementById('editNotes').value.trim();
  m.tag=document.getElementById('editTag').value.trim();
  closeEditModal();render();
  showToast('✓ Member updated');
}

function addMember(){
  const first=document.getElementById('addFirst').value.trim(),last=document.getElementById('addLast').value.trim();
  if(!first){document.getElementById('addMsg').innerHTML='<span style="color:var(--unpaid)">First name required</span>';return}
  const sk=parseInt(document.getElementById('addShakti').value)||0,sv=parseInt(document.getElementById('addSeva').value)||0,sh=parseInt(document.getElementById('addShraddha').value)||0,sn=parseInt(document.getElementById('addSenior').value)||0;
  const totalT=sk+sv+sh+sn;
  const seats=document.getElementById('addSeats').value.trim();
  const seatList=parseSeats(seats);
  // ENFORCE: seats <= tickets
  if(seatList.length>totalT){
    document.getElementById('addMsg').innerHTML=`<span style="color:var(--unpaid)">❌ ${seatList.length} seats exceeds ${totalT} tickets</span>`;return;
  }
  DATA.push({id:DATA.length,first,last,method:document.getElementById('addMethod').value,status:document.getElementById('addStatus').value,shakti:sk,seva:sv,shraddha:sh,senior:sn,tickets:totalT,amount:parseInt(document.getElementById('addAmount').value)||0,seats,notes:document.getElementById('addNotes').value.trim(),donation:parseInt(document.getElementById('addDonation').value)||0,donationNote:'',tag:document.getElementById('addTag').value.trim()});
  document.getElementById('addMsg').innerHTML='<span style="color:var(--paid)">✓ Added!</span>';render();
  setTimeout(()=>{const el=document.getElementById('addMsg');if(el)el.innerHTML=''},2000);
}

// ===== SAVE / LOAD / AUTOSAVE =====
const STORAGE_KEY='bhajan_jamming_2026_data';

function saveState(){
  const json=JSON.stringify(DATA,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const d=new Date();
  a.download=`BhajanJamming_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('💾 State saved to file');
}

function loadState(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const loaded=JSON.parse(e.target.result);
      if(!Array.isArray(loaded)||!loaded[0]||!loaded[0].first){
        showToast('❌ Invalid file format');return;
      }
      DATA=loaded.map((r,i)=>({...r,id:i}));
      autoSave();
      render();
      showToast('✓ Loaded '+DATA.length+' members from file');
    }catch(err){showToast('❌ Error reading file: '+err.message)}
  };
  reader.readAsText(file);
  input.value='';
}

function autoSave(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(DATA));
    const el=document.getElementById('saveStatus');
    if(el){el.textContent='Auto-saved '+new Date().toLocaleTimeString();setTimeout(()=>{if(el)el.textContent=''},3000)}
  }catch(e){}
}

function loadFromStorage(){
  try{
    const stored=localStorage.getItem(STORAGE_KEY);
    if(stored){
      const loaded=JSON.parse(stored);
      if(Array.isArray(loaded)&&loaded.length>0&&loaded[0].first){
        DATA=loaded.map((r,i)=>({...r,id:i}));
        return true;
      }
    }
  }catch(e){}
  return false;
}

function clearSavedState(){
  try{localStorage.removeItem(STORAGE_KEY)}catch(e){}
  initData();render();
  showToast('✓ Reset to original data');
}

// Init: try localStorage first, fallback to hardcoded data
initData();
if(loadFromStorage()){
  const el=document.getElementById('saveStatus');
  if(el)el.textContent='Restored from auto-save';
  setTimeout(()=>{const el=document.getElementById('saveStatus');if(el)el.textContent=''},3000);
}
render();
</script>
